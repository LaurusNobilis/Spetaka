name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

# Cancel any in-progress run for the same branch to avoid wasted minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Analyze · Test · Build
    runs-on: ubuntu-latest  # x86_64 — required for gen_snapshot / AAPT2
    timeout-minutes: 20
    env:
      # Expose signing secret as job-level env so it can be checked in `if:` conditions.
      # The value will be empty ('') when the secret is not configured (e.g. fork PRs).
      SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java (Android toolchain) ──────────────────────────────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Flutter SDK (cached) ──────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.2'
          cache: true           # caches ~/flutter across runs (AC: 3)

      # ── Pub package cache ─────────────────────────────────────────────────
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('spetaka/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        working-directory: spetaka
        run: flutter pub get

      # ── Code generation ───────────────────────────────────────────────────
      - name: Generate code (Riverpod + Drift)
        working-directory: spetaka
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify generated code is committed
        working-directory: spetaka
        run: git diff --exit-code -- lib test

      # ── Quality gate 1: Analyze (AC: 2, 4) ───────────────────────────────
      - name: flutter analyze
        working-directory: spetaka
        run: flutter analyze --no-color

      # ── Quality gate 2: Tests (AC: 2, 4) ─────────────────────────────────
      - name: flutter test
        working-directory: spetaka
        run: flutter test --no-color

      # ── Signing: decode keystore from secret (release builds only) ──────────
      - name: Decode upload keystore
        if: env.SIGNING_KEYSTORE_B64 != ''
        working-directory: spetaka/android
        run: echo "$SIGNING_KEYSTORE_B64" | base64 --decode > upload-keystore.jks

      - name: Write key.properties
        if: env.SIGNING_KEYSTORE_B64 != ''
        working-directory: spetaka/android
        run: |
          cat > key.properties <<EOF
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          storeFile=../android/upload-keystore.jks
          EOF

      # ── Build versioned release APK (AC: 1, 4) ────────────────────────────
      - name: Build release APK
        working-directory: spetaka
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --build-number ${{ github.run_number }}

      # ── Build release AAB for Play Store (AC: 1, 4) ───────────────────────
      - name: Build release AAB (Play Store)
        working-directory: spetaka
        run: |
          flutter build appbundle --release \
            --build-number ${{ github.run_number }}

      # ── Upload APK artifact ───────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: spetaka-release-apk-${{ github.run_number }}
          path: spetaka/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error

      # ── Upload AAB artifact ───────────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: spetaka-release-aab-${{ github.run_number }}
          path: spetaka/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error
