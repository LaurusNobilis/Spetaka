plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Load signing config from key.properties when present (local dev & CI).
// In CI the file is written by the workflow before this step; locally the
// developer creates it once after generating their upload keystore.
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
def signingConfigured = keystorePropertiesFile.exists()
if (signingConfigured) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace = "dev.spetaka.spetaka"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId = "dev.spetaka.spetaka"
        // Spetaka requires API 26+ for AES-256-GCM (javax.crypto) and
        // full Drift/SQLite support without shimming.
        minSdk = 26
        // Pin targetSdk to 35 (Android 15) — Flutter 3.41.2 defaults to 36
        // (Android 16 preview) which causes silent install failures on some
        // Samsung devices whose package installer doesn't recognise API 36 yet.
        // Bump to 36 once Android 16 is stable and widely deployed.
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        if (signingConfigured) {
            release {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = file(keystoreProperties['storeFile'])
                storePassword = keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            // Use Play upload keystore when available; fall back to debug in
            // unsigned local builds only.  CI always provides key.properties.
            signingConfig = signingConfigured
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}
